name: 전파정책 일일 자동 크롤링

on:
  schedule:
    - cron: '9 0-11 * * *'      # 09~20 KST 매시간 :09 (GitHub 스케줄 드롭 대비 이중화)
    - cron: '39 0-11 * * *'     # 09~20 KST 매시간 :39
    - cron: '9 13,18,22 * * *'  # 22시, 03시, 07시 KST :09
    - cron: '39 13,18,22 * * *' # 22시, 03시, 07시 KST :39
    - cron: '5 23 * * *'        # 08:05 KST — 크롤링 + 모닝 브리핑 백업 (브리핑 백업 조건과 연동, 유지)
  workflow_dispatch:             # GitHub에서 수동 실행 버튼

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 패키지 설치
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 supabase anthropic feedparser googlenewsdecoder python-dateutil trafilatura

      - name: 크롤러 실행
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EMAIL_FROM:           ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
        run: python crawler.py

      - name: 모닝 브리핑 실행 (23:05 UTC 스케줄 = 08:05 KST)
        # daily_crawl이 이미 23:05 UTC에 실행되므로 여기서 브리핑도 함께 처리
        # ⚠️ 실제 시각(date)이 아니라 '어느 cron이 트리거했는지'로 판단해야 함
        #    — GitHub 스케줄이 1~2시간 지연돼도 브리핑이 스킵되지 않도록
        if: ${{ github.event_name == 'schedule' && github.event.schedule == '5 23 * * *' }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EMAIL_FROM:           ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
        run: |
          echo "=== 08:00 KST 브리핑 실행 (백업 경로) ==="
          pip install python-dateutil -q || true
          if ! python morning_briefing.py; then
            echo "[경고] morning_briefing.py 실패 — 텔레그램 경고 발송"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="⚠️ 모닝 브리핑 백업 실행 실패 (daily_crawl) — Actions 로그 확인 필요" > /dev/null || true
          fi
