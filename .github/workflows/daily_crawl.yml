name: 전파정책 일일 자동 크롤링

on:
  schedule:
    - cron: '5 0-11 * * *'         # 09~20 KST 매시간
    - cron: '5 13,18,22,23 * * *'  # 22시, 03시, 07시, 08시 KST
  workflow_dispatch:                # GitHub에서 수동 실행 버튼

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 패키지 설치
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 supabase anthropic feedparser googlenewsdecoder python-dateutil trafilatura

      - name: 크롤러 실행
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EMAIL_FROM:           ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
        run: python crawler.py

      - name: 모닝 브리핑 실행 (23시 UTC = 08시 KST)
        # daily_crawl이 이미 23:05 UTC에 실행되므로 여기서 브리핑도 함께 처리
        # morning_briefing.yml cron보다 훨씬 안정적으로 동작
        if: ${{ github.event_name == 'schedule' }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EMAIL_FROM:           ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "23" ]; then
            echo "=== 08:00 KST 브리핑 실행 ==="
            pip install python-dateutil -q
            python morning_briefing.py
          else
            echo "브리핑 시간 아님 (현재 UTC ${HOUR}시) — 건너뜀"
          fi
